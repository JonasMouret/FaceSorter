name: Release (macOS + Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # macOS builds — deux jobs sur macos-14 :
  #   • arm64  : Python via setup-python (natif)
  #   • x86_64 : Python.org universal installer + arch -x86_64 (Rosetta 2)
  # -----------------------------------------------------------------------
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target_arch: x86_64
            ort: "onnxruntime"
            zipname: "FaceSorter-macOS-x86_64.zip"
          - runner: macos-14
            target_arch: arm64
            ort: "onnxruntime-silicon"
            zipname: "FaceSorter-macOS-arm64.zip"

    runs-on: ${{ matrix.runner }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - uses: actions/checkout@v4

      - name: Show runner arch
        run: uname -m && sw_vers -productVersion

      # --- Python arm64 (natif) ---
      - name: Setup Python arm64
        if: matrix.target_arch == 'arm64'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- Python x86_64 via Python.org universal installer ---
      - name: Setup Python x86_64 (universal installer)
        if: matrix.target_arch == 'x86_64'
        run: |
          curl -fsSL "https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg" \
            -o /tmp/python-x86.pkg
          sudo installer -pkg /tmp/python-x86.pkg -target /
          PYPATH="/Library/Frameworks/Python.framework/Versions/3.11/bin"
          echo "PYTHON=arch -x86_64 ${PYPATH}/python3.11" >> "$GITHUB_ENV"
          echo "PIP=arch -x86_64 ${PYPATH}/pip3"          >> "$GITHUB_ENV"
          echo "PYINSTALLER=arch -x86_64 ${PYPATH}/pyinstaller" >> "$GITHUB_ENV"
          echo "${PYPATH}" >> "$GITHUB_PATH"

      # Pour arm64, les commandes sont celles du PATH normal
      - name: Set Python commands (arm64)
        if: matrix.target_arch == 'arm64'
        run: |
          echo "PYTHON=python"           >> "$GITHUB_ENV"
          echo "PIP=pip"                 >> "$GITHUB_ENV"
          echo "PYINSTALLER=pyinstaller" >> "$GITHUB_ENV"

      # --- libheif (arm64 Homebrew seulement ; x86_64 rely on pillow-heif wheels) ---
      - name: Install libheif (arm64)
        if: matrix.target_arch == 'arm64'
        run: brew update && brew install libheif || true

      - name: Install project + build tools
        run: |
          $PIP install --upgrade pip wheel setuptools
          $PIP install .
          $PIP install "numpy<2" ${{ matrix.ort }} pyinstaller

      - name: Download InsightFace models (buffalo_l)
        run: |
          mkdir -p insightface_home/models/buffalo_l
          curl -L -o buffalo_l.zip \
            "https://github.com/deepinsight/insightface/releases/download/v0.7/buffalo_l.zip"
          unzip -o buffalo_l.zip -d insightface_home/models/

      - name: Smoke test
        run: |
          $PYTHON -c "import facesorter; print('version:', facesorter.__version__)"
          mkdir -p people input_photos output_photos

      - name: Build with PyInstaller
        run: $PYINSTALLER --noconfirm --clean tools/FaceSorter.spec

      - name: Ad-hoc code sign
        run: codesign --deep --force --sign - "dist/FaceSorter.app"

      - name: Check binary arch
        run: file "dist/FaceSorter.app/Contents/MacOS/FaceSorter"

      - name: Zip app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent \
            "FaceSorter.app" "${{ matrix.zipname }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zipname }}
          path: dist/${{ matrix.zipname }}

  # -----------------------------------------------------------------------
  # Windows build: x86_64
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install .
          pip install "numpy<2" onnxruntime pyinstaller

      - name: Download InsightFace models (buffalo_l)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path insightface_home\models | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/deepinsight/insightface/releases/download/v0.7/buffalo_l.zip" `
            -OutFile buffalo_l.zip
          Expand-Archive -Path buffalo_l.zip -DestinationPath insightface_home\models\ -Force

      - name: Smoke test
        run: python -c "import facesorter; print('version:', facesorter.__version__)"

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean tools/FaceSorter.spec

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist\FaceSorter `
            -DestinationPath dist\FaceSorter-Windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceSorter-Windows-x86_64.zip
          path: dist/FaceSorter-Windows-x86_64.zip

  # -----------------------------------------------------------------------
  # Create GitHub Release
  # -----------------------------------------------------------------------
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FaceSorter-macOS-x86_64.zip/FaceSorter-macOS-x86_64.zip
            artifacts/FaceSorter-macOS-arm64.zip/FaceSorter-macOS-arm64.zip
            artifacts/FaceSorter-Windows-x86_64.zip/FaceSorter-Windows-x86_64.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
