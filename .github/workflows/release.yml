name: Release (macOS + Windows)

# Triggered automatically when you push a tag like v1.2.3
# or manually from GitHub Actions UI
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # macOS builds: Intel (macos-13) and Apple Silicon (macos-14)
  # -----------------------------------------------------------------------
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14        # Apple Silicon arm64 (runs via Rosetta 2 on Intel)
            ort: "onnxruntime-silicon"
            zipname: "FaceSorter-macOS-arm64.zip"

    runs-on: ${{ matrix.runner }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      DYLD_FALLBACK_LIBRARY_PATH: /usr/local/lib:/opt/homebrew/lib

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show arch
        run: uname -m && sw_vers -productVersion

      - name: Install Homebrew deps (HEIC)
        run: brew update && brew install libheif || true

      - name: Install project + build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install .
          pip install "numpy<2" ${{ matrix.ort }} pyinstaller

      - name: Download InsightFace models (buffalo_l)
        run: |
          mkdir -p insightface_home/models/buffalo_l
          curl -L -o buffalo_l.zip \
            "https://github.com/deepinsight/insightface/releases/download/v0.7/buffalo_l.zip"
          unzip -o buffalo_l.zip -d insightface_home/models/

      - name: Smoke test
        run: |
          python -c "import facesorter, sys; print('facesorter version:', getattr(facesorter, '__version__', 'n/a'))"
          mkdir -p people input_photos output_photos
          facesorter --help

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean tools/FaceSorter.spec

      - name: Check binary arch
        run: file "dist/FaceSorter.app/Contents/MacOS/FaceSorter"

      - name: Zip app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent \
            "FaceSorter.app" "${{ matrix.zipname }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zipname }}
          path: dist/${{ matrix.zipname }}

  # -----------------------------------------------------------------------
  # Windows build: x86_64
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install .
          pip install "numpy<2" onnxruntime pyinstaller

      - name: Download InsightFace models (buffalo_l)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path insightface_home\models | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/deepinsight/insightface/releases/download/v0.7/buffalo_l.zip" `
            -OutFile buffalo_l.zip
          Expand-Archive -Path buffalo_l.zip -DestinationPath insightface_home\models\ -Force

      - name: Smoke test
        run: |
          python -c "import facesorter, sys; print('facesorter version:', getattr(facesorter, '__version__', 'n/a'))"
          python -c "from facesorter.gui.main_window import main; print('GUI import OK')"

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean tools/FaceSorter.spec

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist\FaceSorter `
            -DestinationPath dist\FaceSorter-Windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceSorter-Windows-x86_64.zip
          path: dist/FaceSorter-Windows-x86_64.zip

  # -----------------------------------------------------------------------
  # Create GitHub Release with all three binaries
  # -----------------------------------------------------------------------
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FaceSorter-macOS-arm64.zip/FaceSorter-macOS-arm64.zip
            artifacts/FaceSorter-Windows-x86_64.zip/FaceSorter-Windows-x86_64.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
