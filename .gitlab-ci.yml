# .gitlab-ci.yml — FaceSorter CI/CD
# Déclenché sur chaque push de tag v* ou manuellement depuis l'UI GitLab.
# Runners requis :
#   • Linux   : runner avec exécuteur Docker (tag "docker")
#   • macOS   : runner shell auto-hébergé Apple Silicon (tag "macos-arm64")
#               + runner shell auto-hébergé Intel/Rosetta  (tag "macos-x86_64")
#   • Windows : runner shell auto-hébergé PowerShell       (tag "windows")

stages:
  - build
  - release

variables:
  GIT_DEPTH: "1"
  INSIGHTFACE_URL: "https://github.com/deepinsight/insightface/releases/download/v0.7/buffalo_l.zip"

# ─────────────────────────────── Linux x86_64 ────────────────────────────
build-linux:
  stage: build
  image: python:3.11-slim
  tags:
    - docker
  before_script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends
        curl unzip libgl1 libglib2.0-0
        libxcb1 libx11-xcb1 libxext6 libxi6 libxrender1
        libxrandr2 libxss1 libxcursor1 libxcomposite1
        libxdamage1 libxfixes3 libdbus-1-3 libxkbcommon0 libfontconfig1
  script:
    - pip install --upgrade pip wheel setuptools
    - pip install .
    - pip install "numpy<2" onnxruntime pyinstaller
    - mkdir -p insightface_home/models
    - curl -L -o buffalo_l.zip "$INSIGHTFACE_URL"
    - unzip -o buffalo_l.zip -d insightface_home/models/
    - python -c "import facesorter; print('version:', facesorter.__version__)"
    - pyinstaller --noconfirm --clean tools/FaceSorter.spec
    - tar -czf dist/FaceSorter-Linux-x86_64.tar.gz -C dist FaceSorter
  artifacts:
    name: FaceSorter-Linux-x86_64
    paths:
      - dist/FaceSorter-Linux-x86_64.tar.gz
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"

# ─────────────────────────────── macOS arm64 ─────────────────────────────
build-macos-arm64:
  stage: build
  tags:
    - macos-arm64
  variables:
    MACOSX_DEPLOYMENT_TARGET: "11.0"
  before_script:
    - brew update && brew install libheif || true
  script:
    - pip install --upgrade pip wheel setuptools
    - pip install .
    - pip install "numpy<2" onnxruntime-silicon pyinstaller
    - mkdir -p insightface_home/models
    - curl -L -o buffalo_l.zip "$INSIGHTFACE_URL"
    - unzip -o buffalo_l.zip -d insightface_home/models/
    - python -c "import facesorter; print('version:', facesorter.__version__)"
    - pyinstaller --noconfirm --clean tools/FaceSorter.spec
    - codesign --deep --force --sign - "dist/FaceSorter.app"
    - cd dist && ditto -c -k --sequesterRsrc --keepParent FaceSorter.app FaceSorter-macOS-arm64.zip
  artifacts:
    name: FaceSorter-macOS-arm64
    paths:
      - dist/FaceSorter-macOS-arm64.zip
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"

# ─────────────────────────────── macOS x86_64 ────────────────────────────
build-macos-x86_64:
  stage: build
  tags:
    - macos-x86_64
  variables:
    MACOSX_DEPLOYMENT_TARGET: "11.0"
  script:
    - pip install --upgrade pip wheel setuptools
    - pip install .
    - pip install "numpy<2" onnxruntime pyinstaller
    - mkdir -p insightface_home/models
    - curl -L -o buffalo_l.zip "$INSIGHTFACE_URL"
    - unzip -o buffalo_l.zip -d insightface_home/models/
    - python -c "import facesorter; print('version:', facesorter.__version__)"
    - pyinstaller --noconfirm --clean tools/FaceSorter.spec
    - codesign --deep --force --sign - "dist/FaceSorter.app"
    - cd dist && ditto -c -k --sequesterRsrc --keepParent FaceSorter.app FaceSorter-macOS-x86_64.zip
  artifacts:
    name: FaceSorter-macOS-x86_64
    paths:
      - dist/FaceSorter-macOS-x86_64.zip
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"

# ─────────────────────────────── Windows x86_64 ──────────────────────────
build-windows:
  stage: build
  tags:
    - windows
  script:
    - python -m pip install --upgrade pip wheel setuptools
    - pip install .
    - pip install "numpy<2" onnxruntime pyinstaller
    - New-Item -ItemType Directory -Force -Path insightface_home\models | Out-Null
    - curl.exe -L -o buffalo_l.zip "$env:INSIGHTFACE_URL"
    - Expand-Archive -Path buffalo_l.zip -DestinationPath insightface_home\models\ -Force
    - python -c "import facesorter; print('version:', facesorter.__version__)"
    - pyinstaller --noconfirm --clean tools/FaceSorter.spec
    - Compress-Archive -Path dist\FaceSorter -DestinationPath dist\FaceSorter-Windows-x86_64.zip
  artifacts:
    name: FaceSorter-Windows-x86_64
    paths:
      - dist/FaceSorter-Windows-x86_64.zip
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"

# ─────────────────────────────── Release ─────────────────────────────────
# Upload les artefacts dans le Package Registry GitLab, puis crée la release.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - docker
  needs:
    - job: build-linux
      artifacts: true
    - job: build-macos-arm64
      artifacts: true
    - job: build-macos-x86_64
      artifacts: true
    - job: build-windows
      artifacts: true
  before_script:
    - apk add --no-cache curl
  script:
    - |
      BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/facesorter/${CI_COMMIT_TAG}"
      for FILE in \
        dist/FaceSorter-Linux-x86_64.tar.gz \
        dist/FaceSorter-macOS-arm64.zip \
        dist/FaceSorter-macOS-x86_64.zip \
        dist/FaceSorter-Windows-x86_64.zip; do
        echo "Uploading $(basename $FILE)..."
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$FILE" \
             "${BASE}/$(basename $FILE)"
      done
  release:
    tag_name: $CI_COMMIT_TAG
    name: "FaceSorter $CI_COMMIT_TAG"
    description: "Release automatique — voir CHANGELOG.md pour le détail."
    assets:
      links:
        - name: "FaceSorter-Linux-x86_64.tar.gz"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/facesorter/${CI_COMMIT_TAG}/FaceSorter-Linux-x86_64.tar.gz"
          link_type: package
        - name: "FaceSorter-macOS-arm64.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/facesorter/${CI_COMMIT_TAG}/FaceSorter-macOS-arm64.zip"
          link_type: package
        - name: "FaceSorter-macOS-x86_64.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/facesorter/${CI_COMMIT_TAG}/FaceSorter-macOS-x86_64.zip"
          link_type: package
        - name: "FaceSorter-Windows-x86_64.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/facesorter/${CI_COMMIT_TAG}/FaceSorter-Windows-x86_64.zip"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG
